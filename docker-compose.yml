name: tft-arena

# Usage:
#   docker compose --profile tft watch      → backend + TFT frontend
#   docker compose --profile gauntlet watch  → backend + Gauntlet frontend
#
# File sync keeps running containers up to date:
#   Backend:  Python files synced → uvicorn --reload picks them up
#   Frontend: src/ synced → Vite HMR picks them up
#   Both:     Rebuild image when dependency manifests change

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "sqlite:////data/tft_arena.db"
      LANGMEM_CHROMA_PATH: "/data/chromadb"
      WATCHFILES_FORCE_POLLING: "true"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    volumes:
      - tft_arena_data:/data
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

  frontend-arena:
    profiles: [tft]
    build:
      context: ./frontend-arena
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend-arena/src
          target: /app/src
        - action: sync
          path: ./frontend-arena/public
          target: /app/public
        - action: rebuild
          path: ./frontend-arena/package.json

  gauntlet:
    profiles: [gauntlet]
    build:
      context: ./frontend-gauntlet
      dockerfile: Dockerfile.dev
    ports:
      - "5174:5174"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend-gauntlet/src
          target: /app/src
        - action: rebuild
          path: ./frontend-gauntlet/package.json

volumes:
  tft_arena_data:
    driver: local
