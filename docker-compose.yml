name: tft-arena

# Usage:
#   docker compose watch      → backend + frontend
#
# File sync keeps running containers up to date:
#   Backend:  Python files synced → uvicorn --reload picks them up
#   Frontend: src/ synced → Vite HMR picks them up
#   Both:     Rebuild image when dependency manifests change

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "sqlite:////data/tft_arena.db"
      LANGMEM_CHROMA_PATH: "/data/chromadb"
      WATCHFILES_FORCE_POLLING: "true"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    volumes:
      - tft_arena_data:/data
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json

volumes:
  tft_arena_data:
    driver: local
