[tools]
# No language version pinning needed — uses system Python + Node

# ─────────────────────────────────────────────
# mise tasks — run with: mise run <task>
# ─────────────────────────────────────────────

# ── Local dev (no Docker) ─────────────────────

[tasks.install]
description = "Install all backend and frontend dependencies"
run = """
uv sync --extra dev --project backend
npm install --prefix frontend
"""

[tasks.app-backend]
description = "Start the FastAPI backend locally (hot-reload)"
dir = "backend"
run = "uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

[tasks.app-frontend]
description = "Start the Vite dev server locally"
dir = "frontend"
run = "npm run dev"

[tasks.app]
description = "Install deps then start backend + frontend locally (runs both in parallel)"
depends = ["install", "app-backend", "app-frontend"]
run = "echo 'Both servers started.'"

# ── Docker ────────────────────────────────────

[tasks.docker-up]
description = "Start all services in Docker with hot-reload (compose watch)"
run = "docker compose watch"

[tasks.docker-down]
description = "Stop and remove all Docker containers"
run = "docker compose down"

# ── Tests ─────────────────────────────────────

[tasks.test]
description = "Run the backend Python test suite"
dir = "backend"
run = "uv run python -m pytest tests/ -v"
