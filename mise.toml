[tools]
# No language version pinning needed — uses system Python + Node

# ─────────────────────────────────────────────────────────────
# mise tasks — run with: mise run <task>
# ─────────────────────────────────────────────────────────────

# ── Start ─────────────────────────────────────────────────────

[tasks.dev]
description = "Local: backend + frontend in a tmux split (run 'mise run install' first)"
run = """
tmux kill-session -t arena 2>/dev/null || true
tmux new-session -d -s arena -c "$PWD"
tmux send-keys -t arena 'cd backend && uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000' Enter
tmux split-window -h -t arena -c "$PWD"
tmux send-keys -t arena 'cd frontend && npm run dev' Enter
exec tmux attach-session -t arena
"""

[tasks.dev-docker]
description = "Docker: backend + frontend (compose watch with file sync)"
run = "docker compose watch"

# ── Setup ─────────────────────────────────────────────────────

[tasks.install]
description = "Install all dependencies (backend + frontend)"
run = """
uv sync --extra dev --project backend
npm install --prefix frontend
"""

# ── Lint & Format ─────────────────────────────────────────────

[tasks.lint]
description = "Lint backend (ruff) and frontend (eslint)"
run = """
uv run ruff check . --project backend
npm run lint --prefix frontend
"""

[tasks.format]
description = "Format backend (ruff) and frontend (prettier)"
run = """
uv run ruff format . --project backend
npm run format --prefix frontend
"""

# ── Test ──────────────────────────────────────────────────────

[tasks.test]
description = "Run the backend Python test suite"
dir = "backend"
run = "uv run python -m pytest tests/ -v"
